<html>
<head>
    <title>OS Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="img/background.jpg">
    <script src="script.js"></script>
</head>
<body id ="background" background="img/background.jpg" style="background-repeat: no-repeat; background-size: cover; background-position: center">
<div id="desktop">
    <div class="deskIc" id="me"><img src="img/user.png"><span>Me</span></div>

    <div class="window">
        <div class="hidden" id="meWin"></div>

    </div>

    <div class="deskIc"><img src="img/microsoft.png"><span>Microsoft Edge</span></div>
</div>
<div id="taskbar">
    <div class="tb-icons">
        <div class="icon"><img id="win" src="img/windows.png"></div>
        <div class="icon"><img id="src" src="img/search.png"></div>
        <div class="icon"><img id="exp" src="img/exp.png"></div>
    </div>
    <div class="time">
        <p id="clock"></p>
        <p id="date"></p>
    </div>
</div>
</body>
</html>
